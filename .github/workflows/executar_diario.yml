name: 📈 Carteira Inteligente — Execução Diária

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Barcelona = UTC+2 (verão) / UTC+1 (inverno)
  # 15h35 Barcelona verão  (CEST = UTC+2) = 13h35 UTC
  # 15h35 Barcelona inverno (CET  = UTC+1) = 14h35 UTC  ← ajustar manualmente em outubro
  # Usamos 13h35 UTC — executa às 15h35 no verão
  # 1-5 = Segunda a Sexta apenas (fins de semana excluídos)
  schedule:
    - cron: '35 13 * * 1-5'   # Seg-Sex às 13h35 UTC = 15h35 Barcelona (verão)

  # Permite executar manualmente pelo GitHub (botão "Run workflow")
  workflow_dispatch:

jobs:
  executar-notebook:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # 1 — Fazer checkout do repositório (código + dados)
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 2 — Instalar Python
      - name: 🐍 Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3 — Instalar dependências
      - name: 📦 Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4 — Executar o notebook
      - name: 🚀 Executar PrevisaoCarteira_v5.ipynb
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute \
            --ExecutePreprocessor.timeout=1200 \
            --ExecutePreprocessor.kernel_name=python3 \
            PrevisaoCarteira_v5.ipynb
        env:
          PYTHONUNBUFFERED: "1"

      # 5 — Commit dos ficheiros gerados de volta ao repositório
      - name: 💾 Guardar resultados no repositório
        run: |
          git config user.name  "CarteiraInteligenteBOT"
          git config user.email "bot@carteira.auto"

          git add AnaliseV5/predictions_log.csv
          git add AnaliseV5/ensemble_weights.json
          git add AnaliseV5/resumo_diario.html
          git add AnaliseV5/model_metadata.csv            2>/dev/null || true
          git add AnaliseV5/ultima_recalibracao.json      2>/dev/null || true
          git add AnaliseV5/models/                       2>/dev/null || true
          git add AnaliseV5/AnaliseGraficos/*.png         2>/dev/null || true

          git diff --staged --quiet || git commit -m "📊 Execução automática $(date +'%Y-%m-%d %H:%M') UTC [skip ci]"

          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6 — Obter data para o assunto do email
      - name: 📋 Preparar data
        id: resumo
        if: success()
        run: |
          echo "date=$(date +'%d/%m/%Y')" >> "$GITHUB_OUTPUT"

      # 7 — Enviar email HTML com o resumo das previsões
      - name: 📧 Enviar resumo por email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Carteira Inteligente — ${{ steps.resumo.outputs.date }}"
          to: ${{ secrets.GMAIL_TO }}
          from: CarteiraBOT <${{ secrets.GMAIL_USER }}>
          html_body: file://AnaliseV5/resumo_diario.html
          convert_markdown: false

      # 8 — Enviar email de falha com link para os logs
      - name: 📧 Notificar falha por email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Carteira FALHOU — ver logs"
          to: ${{ secrets.GMAIL_TO }}
          from: CarteiraBOT <${{ secrets.GMAIL_USER }}>
          body: |
            O notebook falhou hoje. Nenhum dado foi atualizado.

            Ver logs completos em:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
