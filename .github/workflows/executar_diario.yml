name: 📈 Carteira Inteligente — Execução Diária

on:
  # Barcelona = UTC+2 (verão) / UTC+1 (inverno)
  # 16h00 Barcelona verão  = 14h00 UTC
  # 16h00 Barcelona inverno= 15h00 UTC
  # Usamos 14h00 UTC — executa às 16h00 no verão, 15h00 no inverno (ambos válidos)
  # 1-5 = Segunda a Sexta apenas (fins de semana excluídos)
  schedule:
    - cron: '0 14 * * 1-5'   # Seg-Sex às 14h00 UTC = 16h00 Barcelona (verão)

  # Permite executar manualmente pelo GitHub (botão "Run workflow")
  workflow_dispatch:

jobs:
  executar-notebook:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # 1 — Fazer checkout do repositório (código + dados)
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 2 — Instalar Python
      - name: 🐍 Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3 — Instalar dependências
      - name: 📦 Instalar dependências
        run: |
          pip install --upgrade pip
          pip install yfinance scikit-learn matplotlib pandas numpy openpyxl nbconvert ipykernel

      # 4 — Executar o notebook
      - name: 🚀 Executar PrevisaoCarteira_v5.ipynb
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute \
            --ExecutePreprocessor.timeout=1200 \
            --ExecutePreprocessor.kernel_name=python3 \
            --output PrevisaoCarteira_v5_output.ipynb \
            PrevisaoCarteira_v5.ipynb
        env:
          PYTHONUNBUFFERED: "1"

      # 5 — Commit dos ficheiros gerados de volta ao repositório
      - name: 💾 Guardar resultados no repositório
        run: |
          git config user.name  "CarteiraBOT"
          git config user.email "bot@carteira.auto"

          git add AnaliseV5/predictions_log.csv
          git add AnaliseV5/ensemble_weights.json
          git add AnaliseV5/resumo_diario.txt
          git add AnaliseV5/AnaliseGraficos/*.png  2>/dev/null || true
          git add PrevisaoCarteira_v5_output.ipynb

          git diff --staged --quiet || git commit -m "📊 Execução automática $(date +'%Y-%m-%d %H:%M') UTC"

          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6 — Ler resumo gerado pelo notebook
      - name: 📋 Ler resumo diário
        id: resumo
        if: success()
        run: |
          CONTENT=$(cat AnaliseV5/resumo_diario.txt 2>/dev/null || echo "Resumo nao disponivel")
          {
            echo "content<<__EOF__"
            echo "$CONTENT"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"
          echo "date=$(date +'%d/%m/%Y')" >> "$GITHUB_OUTPUT"

      # 7 — Enviar email de sucesso com o resumo das previsões
      - name: 📧 Enviar resumo por email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Carteira OK ${{ steps.resumo.outputs.date }} — Previsoes atualizadas"
          to: ${{ secrets.GMAIL_TO }}
          from: CarteiraBOT <${{ secrets.GMAIL_USER }}>
          body: ${{ steps.resumo.outputs.content }}

      # 8 — Enviar email de falha com link para os logs
      - name: 📧 Notificar falha por email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Carteira FALHOU — ver logs"
          to: ${{ secrets.GMAIL_TO }}
          from: CarteiraBOT <${{ secrets.GMAIL_USER }}>
          body: |
            O notebook falhou hoje. Nenhum dado foi atualizado.

            Ver logs completos em:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
