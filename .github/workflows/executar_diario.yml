name: 📈 Carteira Inteligente — Execução Diária

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Barcelona = UTC+2 (verão) / UTC+1 (inverno)
  # Objetivo: email às 17h45 Barcelona (após fecho dos mercados europeus)
  # O GitHub atrasa crons ~3h — por isso agendamos 3h mais cedo (UTC)
  # 12h45 UTC + ~3h delay → disparo real ~15h45 UTC = 17h45 CEST
  # A verificação no job 'verificar' garante que só corre uma vez por dia
  schedule:
    - cron: '45 12 * * 1-5'   # tentativa 1 — alvo 17h45 Barcelona
    - cron: '15 13 * * 1-5'   # tentativa 2 — alvo 18h15 Barcelona (fallback)
    - cron: '45 13 * * 1-5'   # tentativa 3 — alvo 18h45 Barcelona (fallback)

  workflow_dispatch:
    inputs:
      forcar:
        description: 'Forçar execução mesmo que já tenha corrido hoje'
        type: boolean
        default: false

jobs:

  # ── JOB 1: verifica se já executou hoje ──────────────────────────────────
  verificar:
    runs-on: ubuntu-latest
    outputs:
      ja_executou: ${{ steps.check.outputs.ja_executou }}

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🔍 Verificar se já executou hoje
        id: check
        run: |
          TODAY=$(date +%Y-%m-%d)
          FORCE="${{ github.event.inputs.forcar }}"

          if [[ "$FORCE" == "true" ]]; then
            echo "ja_executou=false" >> "$GITHUB_OUTPUT"
            echo "✅ Forçar=true — vai executar mesmo assim"
          elif grep -q "^[^,]*,$TODAY," output/predictions_log.csv 2>/dev/null; then
            echo "ja_executou=true" >> "$GITHUB_OUTPUT"
            echo "⏭️  Já executou hoje ($TODAY) — a saltar"
          else
            echo "ja_executou=false" >> "$GITHUB_OUTPUT"
            echo "🚀 Ainda não executou hoje ($TODAY) — vai arrancar"
          fi

  # ── JOB 2: executa o pipeline (só se ainda não correu hoje) ─────────────
  executar-notebook:
    needs: verificar
    if: needs.verificar.outputs.ja_executou == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # 1 — Fazer checkout do repositório (código + dados)
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 2 — Instalar Python
      - name: 🐍 Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3 — Instalar dependências
      - name: 📦 Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4 — Executar pipeline principal
      - name: 🚀 Executar main.py
        run: python main.py
        env:
          PYTHONUNBUFFERED: "1"

      # 5 — Commit dos ficheiros gerados de volta ao repositório
      - name: 💾 Guardar resultados no repositório
        run: |
          git config user.name  "CarteiraInteligenteBOT"
          git config user.email "bot@carteira.auto"

          git add output/predictions_log.csv
          git add output/ensemble_weights.json
          git add output/resumo_diario.html
          git add output/model_metadata.csv         2>/dev/null || true
          git add output/ultima_recalibracao.json   2>/dev/null || true
          git add output/models/                    2>/dev/null || true
          git add output/charts/*.png               2>/dev/null || true

          git diff --staged --quiet || git commit -m "📊 Execução automática $(date +'%Y-%m-%d %H:%M') UTC [skip ci]"

          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6 — Obter data para o assunto do email
      - name: 📋 Preparar data
        id: resumo
        if: success()
        run: |
          echo "date=$(date +'%d/%m/%Y')" >> "$GITHUB_OUTPUT"

      # 7 — Enviar email HTML com o resumo das previsões
      - name: 📧 Enviar resumo por email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Carteira Inteligente — ${{ steps.resumo.outputs.date }}"
          to: ${{ secrets.GMAIL_TO }}
          from: CarteiraBOT <${{ secrets.GMAIL_USER }}>
          html_body: file://output/resumo_diario.html
          convert_markdown: false

      # 8 — Sincronizar charts com repositório público (janela D-10 a D-19)
      - name: 🌐 Sincronizar repositório público
        if: success()
        run: |
          DATE_MAX=$(date -d "10 days ago" +%Y%m%d)
          DATE_MIN=$(date -d "19 days ago" +%Y%m%d)
          TODAY=$(date +'%Y-%m-%d')
          DATE_MAX_FMT=$(date -d "10 days ago" +'%Y-%m-%d')
          DATE_MIN_FMT=$(date -d "19 days ago" +'%Y-%m-%d')
          echo "Janela pública: $DATE_MIN → $DATE_MAX"

          git clone --depth=1 \
            https://x-access-token:${{ secrets.PUBLIC_REPO_PAT }}@github.com/srxkatsumi/smart-wallet-ml.git \
            /tmp/public_repo

          rm -rf /tmp/public_repo/charts
          mkdir -p /tmp/public_repo/charts

          COUNT=0
          for f in output/charts/*.png; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            fdate="${fname%.png}"
            fdate="${fdate: -8}"
            if [[ "$fdate" -ge "$DATE_MIN" && "$fdate" -le "$DATE_MAX" ]]; then
              cp "$f" /tmp/public_repo/charts/
              COUNT=$((COUNT+1))
            fi
          done
          echo "Charts copiados: $COUNT"

          export TODAY DATE_MIN_FMT DATE_MAX_FMT COUNT
          python3 << 'PYEOF'
          import os
          today       = os.environ["TODAY"]
          date_min    = os.environ["DATE_MIN_FMT"]
          date_max    = os.environ["DATE_MAX_FMT"]
          count       = os.environ["COUNT"]

          readme = f"""\
# smart-wallet-ml

> **Last updated:** {today} &nbsp;·&nbsp; Charts showing data from {date_min} to {date_max} ({count} charts)

[![Python](https://img.shields.io/badge/Python-3.11-3776AB?logo=python)](https://www.python.org/)
[![scikit-learn](https://img.shields.io/badge/scikit--learn-ML-F7931E?logo=scikit-learn)](https://scikit-learn.org/)
[![GitHub Actions](https://img.shields.io/badge/Automated-GitHub%20Actions-2088FF?logo=github-actions)](https://github.com/srxkatsumi/smart-wallet-ml/actions)

---

## What is this?

An automated machine learning system that runs every weekday and generates daily directional forecasts for a personal investment portfolio using ensemble models.

The pipeline downloads fresh market data for 90+ assets, engineers technical indicators, trains three independent classifiers per asset per time horizon, validates each forecast against real closing prices, and reweights the models based on recent accuracy.

Charts are published here with a **10-day delay**. No prices, positions, or portfolio holdings are disclosed.

---

## How it works

```mermaid
flowchart TD
    A["📥 Market Data\nyfinance · 90+ tickers\nVIX · SPY · FX rates"] --> B["⚙️ Feature Engineering\nRSI · MACD · Bollinger Bands\nATR · SMA · 1d/5d returns"]
    B --> C["🤖 Independent Ensemble\nper asset × per horizon\nD+1 · D+2 · D+3"]
    C --> D1["🌲 Random Forest\n300 trees · depth 6"]
    C --> D2["📈 Gradient Boosting\n200 est. · lr 0.05"]
    C --> D3["📐 SGD Classifier\nlog loss · monthly recal."]
    D1 & D2 & D3 --> E["⚖️ Weighted Vote\nadaptive weights\nexponential decay"]
    E --> F["📊 Forecast\nUP / DOWN + confidence"]
    F --> G["✅ Validation\nactual close vs prediction"]
    G --> H["🔄 Weight Update\nmore recent = more weight"]
    H --> E
    F --> I["📧 Daily email\n+ charts → public repo"]
```

---

## AI Models

Three classifiers are combined in a weighted ensemble. Each model was chosen for a specific reason:

| Model | Config | Why |
|-------|--------|-----|
| **Random Forest** | 300 trees, max depth 6 | Robust generaliser — bootstrapped trees resist overfitting on noisy market data. Acts as the ensemble's stability anchor. |
| **Gradient Boosting** | 200 estimators, lr 0.05 | Sequential residual learner — captures patterns RF misses, especially short-term momentum signals. Low learning rate prevents memorising noise. |
| **SGD Classifier** | log loss, L2 | Linear counterweight — cannot model non-linear interactions, so it acts as a dissenting vote when the other two agree on noise. Fully recalibrated monthly. |

### Why independent ensembles per horizon?

D+1, D+2, and D+3 are trained as **completely separate ensembles**. The patterns that predict tomorrow's price differ structurally from those that predict a 3-day move — conflating them into a single model produces weaker forecasts for all horizons.

### Adaptive weights with exponential decay

```
weight(model) ∝ accuracy(model) × Σ decay^(days_ago)
```

Recent correct predictions count more than older ones. If a model starts underperforming after a market regime change, the ensemble automatically reduces its vote share — no manual intervention needed.

---

## Features (what the model sees)

| Feature | Description |
|---------|-------------|
| `sma_20`, `sma_50` | Short and medium-term trend |
| `rsi_14` | Overbought / oversold signal |
| `macd`, `macd_signal` | Momentum and crossovers |
| `bb_upper`, `bb_lower`, `bb_width` | Volatility regime and price extremity |
| `atr_14` | Expected daily move magnitude |
| `ret_1d`, `ret_5d` | Recent momentum |
| `spy_ret_1d` | S&P 500 return (T-1) — global market context |
| `vix_level` | CBOE VIX close (T-1) — market fear level |
| `vix_change` | VIX daily change (T-1) — fear acceleration |

All external context features use T-1 values to prevent data leakage.

