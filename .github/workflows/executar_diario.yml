name: 📈 Carteira Inteligente — Execução Diária

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Barcelona = UTC+2 (verão) / UTC+1 (inverno)
  # Objetivo: executar após fecho dos mercados com dados do dia fechados
  # NYSE/NASDAQ fecham às 20h00 UTC → dados estáveis a partir de 22h UTC
  # Repo público → minutos ilimitados no GitHub Actions
  # A verificação no job 'verificar' garante que só corre uma vez por dia
  schedule:
    - cron: '0 22 * * 1-5'   # tentativa 1 — 22h00 UTC / ~00h00 Barcelona CEST
    - cron: '30 22 * * 1-5'  # tentativa 2 — 22h30 UTC (fallback)
    - cron: '0 23 * * 1-5'   # tentativa 3 — 23h00 UTC (fallback)

  workflow_dispatch:
    inputs:
      forcar:
        description: 'Forçar execução mesmo que já tenha corrido hoje'
        type: boolean
        default: false
      enviar_email:
        description: 'Enviar email com o relatório (por defeito não envia em execuções manuais)'
        type: boolean
        default: false

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:

  # ── JOB 1: verifica se já executou hoje ──────────────────────────────────
  verificar:
    runs-on: ubuntu-latest
    outputs:
      ja_executou: ${{ steps.check.outputs.ja_executou }}

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🔍 Verificar se já executou hoje
        id: check
        run: |
          TODAY=$(date +%Y-%m-%d)
          FORCE="${{ github.event.inputs.forcar }}"
          TRIGGER="${{ github.event_name }}"

          if [[ "$FORCE" == "true" ]]; then
            echo "ja_executou=false" >> "$GITHUB_OUTPUT"
            echo "✅ Forçado — vai executar"
          elif grep -q "^[^,]*,$TODAY," output/predictions_log.csv 2>/dev/null; then
            echo "ja_executou=true" >> "$GITHUB_OUTPUT"
            echo "⏭️  Já executou hoje ($TODAY) — a saltar"
          else
            echo "ja_executou=false" >> "$GITHUB_OUTPUT"
            echo "🚀 Ainda não executou hoje ($TODAY) — vai arrancar"
          fi

  # ── JOB 2: executa o pipeline (só se ainda não correu hoje) ─────────────
  executar-notebook:
    needs: verificar
    if: needs.verificar.outputs.ja_executou == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:

      # 1 — Fazer checkout do repositório (código + dados)
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 2 — Instalar Python
      - name: 🐍 Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 2a — Calcular semana corrente (chave do cache de modelos)
      - name: 📅 Calcular semana
        id: date
        run: echo "week=$(date +%Y-%W)" >> "$GITHUB_OUTPUT"

      # 3 — Instalar dependências
      - name: 📦 Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 3b — Restaurar cache dos modelos de investigação (treino incremental)
      - name: ♻️ Restaurar cache dos modelos de investigação
        uses: actions/cache@v4
        with:
          path: output/models/research/
          key: research-models-${{ runner.os }}-${{ hashFiles('requirements.txt') }}-${{ steps.date.outputs.week }}
          restore-keys: |
            research-models-${{ runner.os }}-${{ hashFiles('requirements.txt') }}-

      # 4 — Executar pipeline principal
      - name: 🚀 Executar main.py
        run: python main.py
        env:
          PYTHONUNBUFFERED: "1"

      # 4b — Validar que os dados foram gerados correctamente
      - name: ✅ Validar dados gerados
        run: |
          TODAY=$(date +%Y-%m-%d)
          COUNT=$(python -c "import pandas as pd; log=pd.read_csv('output/predictions_log.csv'); print(len(log[log['pred_date']=='${TODAY}']))" 2>/dev/null || echo 0)
          echo "Previsões geradas para $TODAY: $COUNT"
          if [ "$COUNT" -lt 10 ]; then
            echo "❌ FALHA: apenas $COUNT previsões geradas — esperado ≥ 10"
            exit 1
          fi
          if [ ! -f output/resumo_diario.html ]; then
            echo "❌ FALHA: resumo_diario.html não foi gerado"
            exit 1
          fi
          if [ ! -f output/ensemble_weights.json ]; then
            echo "❌ FALHA: ensemble_weights.json não foi gerado"
            exit 1
          fi
          echo "✅ Validação OK — $COUNT previsões · HTML · weights"

      # 5b — Mega Sena ML (todos os dias úteis — backfill 300 draws/dia até completar histórico)
      - name: 🎱 Mega Sena ML (backfill diário)
        if: success()
        run: |
          cd test_ml/loteria
          python main.py || echo "Mega Sena falhou (não bloqueia pipeline principal)"
          cd ../..

      # 5 — Commit dos ficheiros gerados de volta ao repositório
      - name: 💾 Guardar resultados no repositório
        run: |
          git config user.name  "CarteiraInteligenteBOT"
          git config user.email "bot@carteira.auto"

          git add output/predictions_log.csv
          git add output/predictions_log_public.csv 2>/dev/null || true
          git add output/ensemble_weights.json
          git add output/research_weights.json         2>/dev/null || true
          git add output/model_metadata.csv         2>/dev/null || true
          git add output/ultima_recalibracao.json   2>/dev/null || true
          git add output/models/*.json               2>/dev/null || true
          # output/models/research/*.pkl — gerido pelo cache Actions, não vai para git
          git add output/charts/*.png               2>/dev/null || true
          git add output/xai/                       2>/dev/null || true
          git add output/predictions_research_log.csv 2>/dev/null || true
          git add output/wfv_log.csv                2>/dev/null || true
          git add output/wfv_results.json           2>/dev/null || true
          git add output/significance.json          2>/dev/null || true

          git diff --staged --quiet || git commit -m "📊 Execução automática $(date +'%Y-%m-%d %H:%M') UTC [skip ci]"

          for i in 1 2 3; do
            git push && break
            if [ $i -lt 3 ]; then
              echo "Push falhou (tentativa $i/3) — rebase e nova tentativa em 15s"
              git pull --rebase
              sleep 15
            else
              echo "Push falhou após 3 tentativas"
              exit 1
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6 — Safety net: guardar predictions_log como artefacto se o push falhar
      - name: 🛟 Artefacto de emergência (push falhou)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: predictions-log-emergency-${{ github.run_id }}
          path: |
            output/predictions_log.csv
            output/ensemble_weights.json
            output/research_weights.json
          retention-days: 7

      # 7 — Obter data para o assunto do email
      - name: 📋 Preparar data
        id: resumo
        if: success() && (github.event_name == 'schedule' || github.event.inputs.enviar_email == 'true')
        run: |
          echo "date=$(date +'%d/%m/%Y')" >> "$GITHUB_OUTPUT"

      # 7 — Enviar email HTML com o resumo das previsões
      - name: 📧 Enviar resumo por email
        id: send_email
        if: success() && (github.event_name == 'schedule' || github.event.inputs.enviar_email == 'true')
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Carteira Inteligente — ${{ steps.resumo.outputs.date }}"
          to: ${{ secrets.GMAIL_TO }}
          from: CarteiraBOT <${{ secrets.GMAIL_USER }}>
          html_body: file://output/resumo_diario.html
          convert_markdown: false

      # 7b — Telegram diário com tendência dos modelos
      - name: 📱 Telegram — tendência dos modelos
        if: success() && (github.event_name == 'schedule' || github.event.inputs.enviar_email == 'true')
        run: |
          python3 - <<'EOF'
          import os, requests, sys
          token   = os.environ.get("TELEGRAM_TOKEN", "")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
          if not token or not chat_id:
              print("Telegram não configurado — a saltar")
              sys.exit(0)
          try:
              msg = open("output/telegram_resumo.txt", encoding="utf-8").read()
          except FileNotFoundError:
              msg = "🤖 Modelos — sem resumo disponível hoje."
          try:
              r = requests.post(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  json={"chat_id": chat_id, "text": msg},
                  timeout=10,
              )
              print(f"Telegram: {r.status_code}")
          except Exception as e:
              print(f"Telegram falhou: {e}")
          EOF
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true

      # 7c — Fallback Telegram se o email falhar
      - name: 📱 Fallback Telegram (email falhou)
        if: steps.send_email.outcome == 'failure' && (github.event_name == 'schedule' || github.event.inputs.enviar_email == 'true')
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="📈 Carteira Inteligente — ${{ steps.resumo.outputs.date }}%0A%0A⚠️ Email falhou. Ver resultados em:%0Ahttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      # 8 — Sincronizar charts com repositório público (janela D-10 a D-19)
      - name: 🌐 Sincronizar repositório público
        if: success()
        run: |
          DATE_MAX=$(date -d "10 days ago" +%Y%m%d)
          DATE_MIN=$(date -d "19 days ago" +%Y%m%d)
          TODAY=$(date +'%Y-%m-%d')
          DATE_MAX_FMT=$(date -d "10 days ago" +'%Y-%m-%d')
          DATE_MIN_FMT=$(date -d "19 days ago" +'%Y-%m-%d')
          echo "Janela pública: $DATE_MIN → $DATE_MAX"

          git clone --depth=1 \
            https://x-access-token:${{ secrets.PUBLIC_REPO_PAT }}@github.com/srxkatsumi/smart-wallet-ml.git \
            /tmp/public_repo

          rm -rf /tmp/public_repo/charts
          mkdir -p /tmp/public_repo/charts

          # Copy anonymised predictions log
          cp output/predictions_log_public.csv /tmp/public_repo/ 2>/dev/null || true

          COUNT=0
          for f in output/charts/*.png; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            fdate="${fname%.png}"
            fdate="${fdate: -8}"
            if [[ "$fdate" -ge "$DATE_MIN" && "$fdate" -le "$DATE_MAX" ]]; then
              cp "$f" /tmp/public_repo/charts/
              COUNT=$((COUNT+1))
            fi
          done
          echo "Charts copiados: $COUNT"

          python3 scripts/gen_public_readme.py "$TODAY" "$DATE_MIN_FMT" "$DATE_MAX_FMT" "$COUNT" /tmp/public_repo/README.md

          cd /tmp/public_repo
          git config user.name  "CarteiraSyncBot"
          git config user.email "bot@carteira.auto"
          git add charts/ README.md predictions_log_public.csv
          git diff --staged --quiet || \
            git commit -m "sync: $TODAY · $DATE_MIN_FMT → $DATE_MAX_FMT · $COUNT charts"
          git push

      # 9 — Enviar email de falha com link para os logs
      - name: 📧 Notificar falha por email
        if: failure() && (github.event_name == 'schedule' || github.event.inputs.enviar_email == 'true')
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Carteira FALHOU — ver logs"
          to: ${{ secrets.GMAIL_TO }}
          from: CarteiraBOT <${{ secrets.GMAIL_USER }}>
          body: |
            O notebook falhou hoje. Nenhum dado foi atualizado.

            Ver logs completos em:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
