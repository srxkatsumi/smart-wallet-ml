name: 📈 Carteira Inteligente — Execução Diária

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Barcelona = UTC+2 (verão) / UTC+1 (inverno)
  # 15h35 Barcelona verão  (CEST = UTC+2) = 13h35 UTC
  # Fallbacks: 14h05 e 14h35 UTC caso o GitHub falhe a tentativa anterior
  # A verificação no job 'verificar' garante que o notebook só corre uma vez por dia
  schedule:
    - cron: '35 13 * * 1-5'   # tentativa 1 — 15h35 Barcelona (verão)
    - cron: '05 14 * * 1-5'   # tentativa 2 — 16h05 Barcelona (fallback)
    - cron: '35 14 * * 1-5'   # tentativa 3 — 16h35 Barcelona (fallback)

  workflow_dispatch:
    inputs:
      forcar:
        description: 'Forçar execução mesmo que já tenha corrido hoje'
        type: boolean
        default: false

jobs:

  # ── JOB 1: verifica se já executou hoje ──────────────────────────────────
  verificar:
    runs-on: ubuntu-latest
    outputs:
      ja_executou: ${{ steps.check.outputs.ja_executou }}

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🔍 Verificar se já executou hoje
        id: check
        run: |
          TODAY=$(date +%Y-%m-%d)
          FORCE="${{ github.event.inputs.forcar }}"

          if [[ "$FORCE" == "true" ]]; then
            echo "ja_executou=false" >> "$GITHUB_OUTPUT"
            echo "✅ Forçar=true — vai executar mesmo assim"
          elif grep -q "^[^,]*,$TODAY," output/predictions_log.csv 2>/dev/null; then
            echo "ja_executou=true" >> "$GITHUB_OUTPUT"
            echo "⏭️  Já executou hoje ($TODAY) — a saltar"
          else
            echo "ja_executou=false" >> "$GITHUB_OUTPUT"
            echo "🚀 Ainda não executou hoje ($TODAY) — vai arrancar"
          fi

  # ── JOB 2: executa o pipeline (só se ainda não correu hoje) ─────────────
  executar-notebook:
    needs: verificar
    if: needs.verificar.outputs.ja_executou == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # 1 — Fazer checkout do repositório (código + dados)
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 2 — Instalar Python
      - name: 🐍 Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3 — Instalar dependências
      - name: 📦 Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4 — Executar pipeline principal
      - name: 🚀 Executar main.py
        run: python main.py
        env:
          PYTHONUNBUFFERED: "1"

      # 5 — Commit dos ficheiros gerados de volta ao repositório
      - name: 💾 Guardar resultados no repositório
        run: |
          git config user.name  "CarteiraInteligenteBOT"
          git config user.email "bot@carteira.auto"

          git add output/predictions_log.csv
          git add output/ensemble_weights.json
          git add output/resumo_diario.html
          git add output/model_metadata.csv         2>/dev/null || true
          git add output/ultima_recalibracao.json   2>/dev/null || true
          git add output/models/                    2>/dev/null || true
          git add output/charts/*.png               2>/dev/null || true

          git diff --staged --quiet || git commit -m "📊 Execução automática $(date +'%Y-%m-%d %H:%M') UTC [skip ci]"

          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6 — Obter data para o assunto do email
      - name: 📋 Preparar data
        id: resumo
        if: success()
        run: |
          echo "date=$(date +'%d/%m/%Y')" >> "$GITHUB_OUTPUT"

      # 7 — Enviar email HTML com o resumo das previsões
      - name: 📧 Enviar resumo por email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Carteira Inteligente — ${{ steps.resumo.outputs.date }}"
          to: ${{ secrets.GMAIL_TO }}
          from: CarteiraBOT <${{ secrets.GMAIL_USER }}>
          html_body: file://output/resumo_diario.html
          convert_markdown: false

      # 8 — Enviar email de falha com link para os logs
      - name: 📧 Notificar falha por email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Carteira FALHOU — ver logs"
          to: ${{ secrets.GMAIL_TO }}
          from: CarteiraBOT <${{ secrets.GMAIL_USER }}>
          body: |
            O notebook falhou hoje. Nenhum dado foi atualizado.

            Ver logs completos em:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
