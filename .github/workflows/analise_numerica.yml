name: Mega Sena ML Experiment

on:
  schedule:
    # Every Sunday at 22:00 UTC — after Saturday's draw results are published
    - cron: '0 22 * * 0'
  workflow_dispatch:   # manual trigger for testing

jobs:
  analise:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -q pandas numpy scikit-learn requests beautifulsoup4 lxml

      - name: Run experiment
        working-directory: test_ml/analisenumerica
        run: python main.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test_ml/analisenumerica/output/
          git add test_ml/analisenumerica/README.md
          git add test_ml/analisenumerica/README_pt.md
          if git diff --cached --quiet; then
            echo "Sem alterações"
          else
            git commit -m "chore: mega-sena update $(date +%Y-%m-%d) [skip ci]"
            for i in 1 2 3; do
              git push && break
              git pull --rebase && sleep 10
            done
          fi
